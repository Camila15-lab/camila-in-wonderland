<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank You — Camila in Wonderland</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      color: #fff;
      background:
        radial-gradient(circle at 50% 30%, rgba(200,164,90,.18), transparent 28%),
        linear-gradient(180deg, #06100c, #10261f);
      font-family: "Montserrat", sans-serif;
    }
    .card {
      max-width: 680px;
      padding: 55px 35px;
      border: 1px solid #c8a45a;
      border-radius: 28px;
      background: rgba(255,255,255,.05);
    }
    h1 {
      margin: 0 0 15px;
      font-family: "Cormorant Garamond", serif;
      font-size: 58px;
    }
    p { line-height: 1.7; }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 24px;
      border-radius: 999px;
      color: #10231c;
      background: linear-gradient(135deg, #9baa87, #d5a2ad);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Thank You!</h1>
    <p>Your response has been received. We cannot wait to celebrate Camila's very important date with you.</p>
    <a href="/">Return to Wonderland</a>
  </main>
</body>
</html>
