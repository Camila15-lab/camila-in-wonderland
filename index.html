<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <meta name="theme-color" content="#0d241a">

  <title>Camila’s Wonderland</title>

  <meta
    name="description"
    content="Camila’s magical fifteenth birthday celebration on September 11, 2026."
  >

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Italiana&family=Montserrat:wght@400;500;600&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --forest: #0d241a;
      --forest-light: #193d2b;
      --forest-soft: #31533d;
      --burgundy: #651e32;
      --wine: #822f47;
      --gold: #cba75d;
      --gold-light: #ecd99e;
      --ivory: #fff8e9;
      --sage: #93a57f;
      --powder-blue: #b8d1e2;
      --lavender: #a891b8;
      --blush: #c98e9b;
      --ink: #26372e;
      --shadow: rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      overflow-x: hidden;
      color: var(--ivory);
      background: var(--forest);
      font-family: "Montserrat", sans-serif;
    }

    body.locked {
      overflow: hidden;
    }

    h1,
    h2,
    h3,
    .brand {
      font-family: "Cormorant Garamond", serif;
    }

    a {
      color: inherit;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .hidden {
      display: none;
    }

    .section {
      position: relative;
      min-height: 100vh;
      padding: 105px 7vw 80px;
      overflow: hidden;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--gold-light);
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    .eyebrow.dark {
      color: #745c29;
    }

    .primary-button {
      display: inline-block;
      padding: 15px 28px;
      border: 1px solid var(--gold);
      border-radius: 999px;
      color: var(--ivory);
      background:
        linear-gradient(
          135deg,
          var(--burgundy),
          var(--wine)
        );
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.32);
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .primary-button:hover {
      transform: translateY(-2px);
    }

    .text-link {
      padding: 0;
      border: 0;
      color: #765a21;
      background: none;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition:
        opacity 0.8s ease,
        transform 0.8s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: none;
    }

    /* OPENING */

    #opening {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(
          circle at center,
          rgba(203, 167, 93, 0.16),
          transparent 34%
        ),
        linear-gradient(
          180deg,
          #030906,
          var(--forest)
        );
      transition:
        opacity 1s ease,
        visibility 1s ease;
    }

    #opening.opened {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .opening-card {
      position: relative;
      width: min(640px, 94vw);
      min-height: 650px;
